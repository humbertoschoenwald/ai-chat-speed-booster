name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Validate and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.8.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release version
        run: node scripts/check-release-version.mjs

      - name: Validate
        run: pnpm run validate

      - name: Update store versions
        run: pnpm run store:versions

      - name: Generate changelog
        run: pnpm run changelog

      - name: Commit generated release metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(changelog): update release metadata for ${GITHUB_REF_NAME} [skip changelog]"
          git push origin HEAD:main

      - name: Package release artifacts
        run: pnpm run package

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            deploys/*.zip
